<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Apple Residency Accounts Dashboard FY 24-25</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/accounts-style.css">
   
</head>
<body>

  <!-- Banner & Nav -->
  <div class="banner">
    <img src="images/banner1.png" alt="Apple Residency Banner" class="banner-img">
  </div>
  <nav>
    <div class="nav-left">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="committee.html">Committee</a>
      <a href="notices.html">Notices</a>
    </div>
    <div class="nav-right">
      <a href="index.html">Logout</a>
    </div>
  </nav>

  <h2>📊 Accounts Dashboard - FY 24-25</h2>

  <!-- Entry Form -->
  <div class="entry-form">
    <h3>Add Entry</h3>
    <form id="entryForm">
      <label>Date:</label>
      <input type="text" id="entryDate" placeholder="dd/mm/yyyy" required>

      <label>Name:</label>
      <input type="text" id="entryName" placeholder="Member / Payee" required>

      <label>Description:</label>
      <input type="text" id="entryDesc" placeholder="Description" required>

      <label>Category:</label>
      <select id="entryCategory" required>
        <option value="">--Select--</option>
        <option>MC Subscription</option>
        <option>Corpus Fund</option>
        <option>AMC Fund</option>
        <option>Donations</option>
        <option>Maintenance</option>
        <option>Salary & Wages</option>
        <option>Electricity Bill</option>
        <option>Repairs</option>
        <option>Stock/Assets</option>
        <option>Gift & Donations</option>
        <option>Sundry Expense</option>
        <option>Stationery</option>
        <option>Fees & Taxes</option>
      </select>

      <label>Payment Mode:</label>
      <select id="entryPayment" required>
        <option value="">--Select--</option>
        <option>Cash</option>
        <option>Bank</option>
        <option>G-Pay</option>
        <option>NEFT/RTGS</option>
      </select>

      <label>Credit (₹):</label>
      <input type="number" id="entryCredit" value="0" min="0">

      <label>Debit (₹):</label>
      <input type="number" id="entryDebit" value="0" min="0">

      <button type="submit">Submit Entry</button>
    </form>
  </div>

  <!-- Day Book Table -->
  <div class="day-book">
    <h3>Day Book - September 2024</h3>
    <table id="dayBook">
      <thead>
        <tr>
          <th>Date</th>
          <th>Name</th>
          <th>Description</th>
          <th>Category</th>
          <th>Payment Mode</th>
          <th>Cash Credit</th>
          <th>Cash Debit</th>
          <th>Bank Credit</th>
          <th>Bank Debit</th>
        </tr>
      </thead>
      <tbody>
        <!-- Opening Balance Row -->
        <tr>
          <td>01/09/2024</td>
          <td>Opening Balance</td>
          <td>Opening Balance</td>
          <td>Cash/Bank</td>
          <td>Bank</td>
          <td>0</td>
          <td>0</td>
          <td>43325</td>
          <td>0</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Scripts -->
  <script>
    // Password Lock
    const password = "Treasurer2024";
    let userPass = prompt("Enter Treasurer Password:");
    if(userPass !== password) {
      alert("Incorrect Password. Access Denied.");
      document.body.innerHTML = "<h1>ACCESS DENIED</h1>";
    }

    // Add Entry Form Logic
    const form = document.getElementById('entryForm');
    const dayBook = document.getElementById('dayBook').getElementsByTagName('tbody')[0];

    form.addEventListener('submit', function(e){
      e.preventDefault();

      const date = document.getElementById('entryDate').value;
      const name = document.getElementById('entryName').value;
      const desc = document.getElementById('entryDesc').value;
      const category = document.getElementById('entryCategory').value;
      const payment = document.getElementById('entryPayment').value;
      const credit = parseFloat(document.getElementById('entryCredit').value) || 0;
      const debit = parseFloat(document.getElementById('entryDebit').value) || 0;

      // Determine Cash/Bank columns
      let cashCr = 0, cashDr = 0, bankCr = 0, bankDr = 0;
      if(payment === "Cash"){
        cashCr = credit;
        cashDr = debit;
      } else {
        bankCr = credit;
        bankDr = debit;
      }

      // Append row
      const row = dayBook.insertRow();
      row.innerHTML = `
        <td>${date}</td>
        <td>${name}</td>
        <td>${desc}</td>
        <td>${category}</td>
        <td>${payment}</td>
        <td>${cashCr}</td>
        <td>${cashDr}</td>
        <td>${bankCr}</td>
        <td>${bankDr}</td>
      `;

      // Reset form
      form.reset();

      // Update Closing Balance dynamically
      updateClosingBalance();
    });

    function updateClosingBalance(){
      const rows = dayBook.rows;
      let cashBalance = 0, bankBalance = 0;
      for(let i=0;i<rows.length;i++){
        const cCr = parseFloat(rows[i].cells[5].textContent) || 0;
        const cDr = parseFloat(rows[i].cells[6].textContent) || 0;
        const bCr = parseFloat(rows[i].cells[7].textContent) || 0;
        const bDr = parseFloat(rows[i].cells[8].textContent) || 0;
        cashBalance += (cCr - cDr);
        bankBalance += (bCr - bDr);
      }
      // Remove old closing balance if exists
      const lastRow = rows[rows.length-1];
      if(lastRow.cells[1].textContent === "Closing Balance"){
        dayBook.deleteRow(rows.length-1);
      }
      // Append new closing balance
      const row = dayBook.insertRow();
      row.innerHTML = `
        <td>--</td>
        <td>Closing Balance</td>
        <td>Closing Balance</td>
        <td>Cash/Bank</td>
        <td>--</td>
        <td>${cashBalance}</td>
        <td>0</td>
        <td>${bankBalance}</td>
        <td>0</td>
      `;
    }
  </script>

</body>
</html>
