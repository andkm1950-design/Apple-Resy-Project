<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Residency Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
        }

        /* NAVBAR */
        nav {
            background: #2c3e50;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* CONTENT */
        .container {
            padding: 20px;
            display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
             transition: 0.3s;
        cursor: pointer;
        }
         .card:hover {
        transform: translateY(-5px);
    }


        
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <a href="dashboard.html">Home</a>
    <a href="committee.html">Committee</a>
    <a href="notices.html">Notices</a>
    <a href="#" onclick="logout()">Logout</a>
</nav>

<!-- CONTENT -->
<div class="container">

    <div class="card">
    <h2>Maintenance Details</h2>
    <p>View monthly maintenance dues and payment status.</p>
    <a href="maintenance.html">View Details</a>
</div>

<div class="card">
    <h2>Association Documents</h2>
    <p>Access important documents (restricted).</p>
    <a href="documents.html">Open Documents</a>
</div>

<div class="card">
    <h2>Notices & Announcements</h2>
    <p>Latest updates and circulars.</p>
    <a href="notices.html">View Notices</a>
</div>

</div>

<!-- LOGIN CHECK -->
<script>
if (!sessionStorage.getItem("loggedIn")) {
    alert("Please login first");
    window.location.href = "login.html";
}

// LOGOUT FUNCTION
function logout() {
    sessionStorage.removeItem("loggedIn");
    window.location.href = "login.html";
}
</script>

</body>
</html>
