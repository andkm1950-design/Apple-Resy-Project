<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Residency Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
        }

        /* NAVBAR */
        nav {
            background: #2c3e50;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* CONTENT */
        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <a href="dashboard.html">Home</a>
    <a href="committee.html">Committee</a>
    <a href="notices.html">Notices</a>
    <a href="#" onclick="logout()">Logout</a>
</nav>

<!-- CONTENT -->
<div class="container">

    <div class="card">
        <h2>Welcome to Dashboard</h2>
        <p>Members area - secured content</p>
    </div>

</div>

<!-- LOGIN CHECK -->
<script>
if (!sessionStorage.getItem("loggedIn")) {
    alert("Please login first");
    window.location.href = "login.html";
}

// LOGOUT FUNCTION
function logout() {
    sessionStorage.removeItem("loggedIn");
    window.location.href = "login.html";
}
</script>

</body>
</html>
